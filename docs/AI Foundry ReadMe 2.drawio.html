amp;amp;nbsp;&amp;lt;/font&amp;gt;&amp;lt;div&amp;gt;&amp;lt;font style=&amp;quot;font-size: 11px;&amp;quot; color=&amp;quot;#c9d1d9&amp;quot;&amp;gt;11. Prerequisites &amp;amp;nbsp;&amp;amp;nbsp; 12. FAQ &amp;amp;nbsp;&amp;amp;nbsp; 13. Contact&amp;lt;/font&amp;gt;&amp;lt;/div&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;30\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;180\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s1_hdr\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=#161b22;fontColor=#58a6ff;align=left;verticalAlign=middle;fontSize=15;fontStyle=1;spacingLeft=10;\&quot; value=\&quot;1. Overview\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;34\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;226\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s1_body\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;spacingLeft=12;spacingRight=12;spacingTop=8;whiteSpace=wrap;\&quot; value=\&quot;&amp;lt;p style=&amp;#39;font-size:11px;color:#c9d1d9;&amp;#39;&amp;gt;The &amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#f0883e&amp;#39;&amp;gt;AI Foundry Platform&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt; is a &amp;lt;b&amp;gt;Hub-Based Azure AI Foundry deployment&amp;lt;/b&amp;gt; that enables multiple agency teams to onboard AI projects quickly, securely, and consistently. Rather than each team independently provisioning AI infrastructure, all projects share a single AI Foundry Hub — isolating teams through Azure RBAC and dedicated VNet spoke networks.&amp;lt;/p&amp;gt;&amp;lt;p style=&amp;#39;font-size:11px;color:#c9d1d9;&amp;#39;&amp;gt;This architecture was designed to address the three most common onboarding patterns encountered across agency teams, ranging from fully private agent deployments requiring zero public internet exposure, to lightweight LLM access, to projects that consume shared enterprise data resources.&amp;lt;/p&amp;gt;&amp;lt;p style=&amp;#39;font-size:11px;color:#c9d1d9;&amp;#39;&amp;gt;&amp;lt;b&amp;gt;What this repo/document contains:&amp;lt;/b&amp;gt; Architecture diagrams (Pages 1–2), PRD &amp;amp; Technical Design (Pages 3–4), and this README (Page 5). The draw.io file is the single source of truth for all design artifacts.&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;118\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;260\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s2_hdr\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=#161b22;fontColor=#58a6ff;align=left;verticalAlign=middle;fontSize=15;fontStyle=1;spacingLeft=10;\&quot; value=\&quot;2. Architecture Model\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;34\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;392\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s2_body\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;spacingLeft=12;spacingRight=12;spacingTop=8;\&quot; value=\&quot;&amp;lt;p style=&amp;quot;font-size: 11px; color: rgb(201, 209, 217);&amp;quot;&amp;gt;This platform uses the &amp;lt;b&amp;gt;&amp;lt;font color=&amp;quot;#3fb950&amp;quot;&amp;gt;Hub + Projects model&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt; — one AI Foundry Hub owns the shared infrastructure and acts as the governance boundary. Each team onboards as a &amp;lt;b&amp;gt;Project&amp;lt;/b&amp;gt; under this Hub. The Hub is &amp;lt;i&amp;gt;not&amp;lt;/i&amp;gt; a separate deployment&amp;amp;nbsp;&amp;lt;/p&amp;gt;&amp;lt;p style=&amp;quot;font-size: 11px; color: rgb(201, 209, 217);&amp;quot;&amp;gt;per team (that would be the Foundry Projects-only model, which is higher cost and loses shared governance).&amp;lt;/p&amp;gt;&amp;lt;p style=&amp;quot;font-size: 11px; color: rgb(201, 209, 217);&amp;quot;&amp;gt;&amp;lt;b&amp;gt;Hub responsibilities:&amp;lt;/b&amp;gt; Owns the AI Foundry resource, shared connected resources (Azure OpenAI, AI Search, Storage, Key Vault), VNet peering configs, and Private DNS Zones. &amp;lt;b&amp;gt;Project responsibilities:&amp;lt;/b&amp;gt; Team RBAC, per-project&amp;amp;nbsp;&amp;lt;/p&amp;gt;&amp;lt;p style=&amp;quot;font-size: 11px; color: rgb(201, 209, 217);&amp;quot;&amp;gt;connected resources (where UC requires), private endpoints scoped to the project spoke, and workload compute.&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;114\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;426\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;mc_th1\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#161b22;fontColor=#58a6ff;align=center;verticalAlign=middle;fontSize=11;fontStyle=1;\&quot; value=\&quot;Attribute\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;28\&quot; width=\&quot;220\&quot; x=\&quot;40\&quot; y=\&quot;548\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;mc_th2\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#1a7f37;fontColor=#ffffff;align=center;verticalAlign=middle;fontSize=11;fontStyle=1;\&quot; value=\&quot;Hub-Based (THIS architecture)\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;28\&quot; width=\&quot;380\&quot; x=\&quot;260\&quot; y=\&quot;548\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;mc_th3\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#6e1010;fontColor=#ffffff;align=center;vertical ll id=\&quot;mc3c\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;fontColor=#8b949e;align=left;verticalAlign=middle;fontSize=10;spacingLeft=8;\&quot; value=\&quot;✅ Full resource-level isolation (overkill for most)\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;24\&quot; width=\&quot;560\&quot; x=\&quot;640\&quot; y=\&quot;624\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;mc4a\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#161b22;fontColor=#8b949e;align=left;verticalAlign=middle;fontSize=10;spacingLeft=8;\&quot; value=\&quot;Onboarding speed\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;24\&quot; width=\&quot;220\&quot; x=\&quot;40\&quot; y=\&quot;648\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;mc4b\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;fontColor=#3fb950;align=left;verticalAlign=middle;fontSize=10;spacingLeft=8;\&quot; value=\&quot;✅ Fast – new Project under existing Hub (&amp;lt;5 days)\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;24\&quot; width=\&quot;380\&quot; x=\&quot;260\&quot; y=\&quot;648\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;mc4c\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;fontColor=#f85149;align=left;verticalAlign=middle;fontSize=10;spacingLeft=8;\&quot; value=\&quot;❌ Slow – new Hub + infrastructure per team\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;24\&quot; width=\&quot;560\&quot; x=\&quot;640\&quot; y=\&quot;648\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s3_hdr\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=#161b22;fo d1d9;align=left;verticalAlign=middle;fontSize=10;spacingLeft=8;\&quot; value=\&quot;Defender for Cloud Standard plan enabled on subscription BEFORE first project onboards (required for UC1 compliance).\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;28\&quot; width=\&quot;940\&quot; x=\&quot;260\&quot; y=\&quot;2026\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s12h\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=#161b22;fontColor=#58a6ff;align=left;verticalAlign=middle;fontSize=15;fontStyle=1;spacingLeft=10;\&quot; value=\&quot;12.  Frequently Asked Questions\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;32\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2068\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;faq_0\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;fontSize=11;spacingLeft=10;spacingTop=6;spacingRight=8;\&quot; value=\&quot;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#e3b341&amp;#39;&amp;gt;Q: Do the 3 use cases require separate subscriptions?&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;font color=&amp;#39;#c9d1d9&amp;#39; style=&amp;#39;font-size:10px;&amp;#39;&amp;gt;A: No. All three use cases run within a single subscription. Isolation is achieved through RBAC (scoped per project) and dedicated VNet spokes. Separate subscriptions are only needed if there is a hard compliance boundary (e.g. FedRAMP vs standard) or a billing chargeback requirement that cannot be satisfied with cost tags.&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;52\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2100\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;faq_1\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;fontSize=11;spacingLeft=10;spacingTop=6;spacingRight=8;\&quot; value=\&quot;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#e3b341&amp;#39;&amp;gt;Q: Can UC1 and UC2 teams share an AI Search index?&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;font color=&amp;#39;#c9d1d9&amp;#39; style=&amp;#39;font-size:10px;&amp;#39;&amp;gt;A: No by default. Each project has its own connected AI Search resource. UC3 is the pattern for intentional resource sharing — it provides controlled read-only access via Managed Identity with explicit RBAC grants.&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;52\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2152\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;faq_2\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;fontSize=11;spacingLeft=10;spacingTop=6;spacingRight=8;\&quot; value=\&quot;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#e3b341&amp;#39;&amp;gt;Q: What happens if a team needs both private endpoints AND shared resources?&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;font color=&amp;#39;#c9d1d9&amp;#39; style=&amp;#39;font-size:10px;&amp;#39;&amp;gt;A: A project can be a hybrid of UC1 and UC3. The private endpoint pattern from UC1 is applied for connectivity, and the shared resource access model from UC3 is applied for the external Cosmos DB / Data Lake. Document this as a custom variant in the onboarding ticket.&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;52\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2204\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;faq_3\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;fontSize=11;spacingLeft=10;spacingTop=6;spacingRight=8;\&quot; value=\&quot;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#e3b341&amp;#39;&amp;gt;Q: Can teams deploy their own resources outside the AI Foundry Project?&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;font color=&amp;#39;#c9d1d9&amp;#39; style=&amp;#39;font-size:10px;&amp;#39;&amp;gt;A: Only within their scoped Resource Group. Azure Policy prevents deploying public-facing resources or resources in non-approved regions. All networking changes must go through the Platform Team.&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;52\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2256\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;faq_4\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;fontSize=11;spacingLeft=10;spacingTop=6;spacingRight=8;\&quot; value=\&quot;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#e3b341&amp;#39;&amp;gt;Q: How are LLM model deployments managed?&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;font color=&amp;#39;#c9d1d9&amp;#39; style=&amp;#39;font-size:10px;&amp;#39;&amp;gt;A: Model deployments (e.g. GPT-4o, Ada-002) are managed at the Hub level by the Platform Team. Teams request new deployments via ticket. Quota is allocated per project using Azure OpenAI deployment quotas.&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;52\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2308\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;faq_5\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;fontSize=11;spacingLeft=10;spacingTop=6;spacingRight=8;\&quot; value=\&quot;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#e3b341&amp;#39;&amp;gt;Q: Is the Hub a single point of failure?&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;font color=&amp;#39;#c9d1d9&amp;#39; style=&amp;#39;font-size:10px;&amp;#39;&amp;gt;A: The AI Foundry Hub is a control plane resource. It does not process inference traffic — that goes directly to Azure OpenAI. Hub unavailability affects project management (portal/API), not live AI inference calls already in flight.&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;52\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2360\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s13h\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=#161b22;fontColor=#58a6ff;align=left;verticalAlign=middle;fontSize=15;fontStyle=1;spacingLeft=10;\&quot; value=\&quot;13.  Contributing &amp;amp; Contact\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;32\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2422\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s13b\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=left;verticalAlign=top;fontSize=11;spacingLeft=10;spacingTop=6;spacingRight=8;\&quot; value=\&quot;&amp;lt;font color=&amp;#39;#c9d1d9&amp;#39; style=&amp;#39;font-size:10px;&amp;#39;&amp;gt;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#58a6ff&amp;#39;&amp;gt;Document Owner:&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;  AI Platform Team — responsible for all architecture decisions, IaC modules, and onboarding approvals.&amp;lt;br/&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#58a6ff&amp;#39;&amp;gt;To request changes to this architecture:&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;  Raise a PR against this draw.io file in the platform repo, or open an Architecture Review Board (ARB) ticket for major changes (new use case, subscription changes, security control changes).&amp;lt;br/&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#58a6ff&amp;#39;&amp;gt;To onboard a new project:&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;  Follow Section 9 — submit a service desk ticket with the required fields. SLA: 5 business days from approved ticket to live project.&amp;lt;br/&amp;gt;&amp;lt;br/&amp;gt;&amp;lt;b&amp;gt;&amp;lt;font color=&amp;#39;#58a6ff&amp;#39;&amp;gt;Security incidents:&amp;lt;/font&amp;gt;&amp;lt;/b&amp;gt;  Report immediately to the Security Operations Centre (SOC). Do not raise a standard service desk ticket for suspected breaches.&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;88\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2454\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;footer\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#30363d;fillColor=#0d1117;align=center;verticalAlign=middle;fontSize=10;\&quot; value=\&quot;&amp;lt;font color=&amp;#39;#8b949e&amp;#39;&amp;gt;AI Foundry Platform  |  README v1.0  |  March 2026  |  CONFIDENTIAL – Internal Use Only  |  Owner: AI Platform Team&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;28\&quot; width=\&quot;1160\&quot; x=\&quot;40\&quot; y=\&quot;2554\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n      &lt;/root&gt;\n    &lt;/mxGraphModel&gt;\n  &lt;/diagram&gt;\n  &lt;diagram id=\&quot;Bcb4Jjq7owuua3Ab7XSD\&quot; name=\&quot;PRD - Page 1\&quot;&gt;\n    &lt;mxGraphModel dx=\&quot;1018\&quot; dy=\&quot;613\&quot; grid=\&quot;1\&quot; gridSize=\&quot;10\&quot; guides=\&quot;1\&quot; tooltips=\&quot;1\&quot; connect=\&quot;1\&quot; arrows=\&quot;1\&quot; fold=\&quot;1\&quot; page=\&quot;1\&quot; pageScale=\&quot;1\&quot; pageWidth=\&quot;850\&quot; pageHeight=\&quot;1100\&quot; math=\&quot;0\&quot; shadow=\&quot;0\&quot;&gt;\n      &lt;root&gt;\n        &lt;mxCell id=\&quot;0\&quot; /&gt;\n        &lt;mxCell id=\&quot;1\&quot; parent=\&quot;0\&quot; /&gt;\n        &lt;mxCell id=\&quot;hdr_bg\&quot; parent=\&quot;1\&quot; style=\&quot;rounded=0;whiteSpace=wrap;html=1;fillColor=#1e3a5f;strokeColor=#1e3a5f;\&quot; value=\&quot;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;90\&quot; width=\&quot;1100\&quot; x=\&quot;50\&quot; y=\&quot;30\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;hdr_title\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;\&quot; value=\&quot;&amp;lt;font color=&amp;quot;#ffffff&amp;quot; style=&amp;quot;font-size:22px;font-weight:bold;&amp;quot;&amp;gt;AI Foundry Platform – PRD &amp;amp; Technical Design Document&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;40\&quot; width=\&quot;800\&quot; x=\&quot;70\&quot; y=\&quot;40\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;hdr_meta\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;fontSize=11;\&quot; value=\&quot;&amp;lt;font color=&amp;quot;#add8e6&amp;quot;&amp;gt;Version: 1.0 &amp;amp;nbsp;|&amp;amp;nbsp; Status: DRAFT &amp;amp;nbsp;|&amp;amp;nbsp; Date: March 2026 &amp;amp;nbsp;|&amp;amp;nbsp; Owner: AI Platform Team&amp;lt;/font&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;25\&quot; width=\&quot;700\&quot; x=\&quot;70\&quot; y=\&quot;82\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s1_hdr\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=#1e3a5f;fontColor=#ffffff;align=left;verticalAlign=middle;fontSize=13;fontStyle=1;rounded=1;\&quot; value=\&quot;1. Executive Summary\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;30\&quot; width=\&quot;1100\&quot; x=\&quot;50\&quot; y=\&quot;140\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s1_body\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#cccccc;fillColor=#f9f9f9;align=left;verticalAlign=top;fontSize=11;spacingLeft=8;spacingRight=8;spacingTop=6;\&quot; value=\&quot;&amp;lt;p&amp;gt;This document defines the product requirements and technical design for the &amp;lt;b&amp;gt;AI Foundry Platform&amp;lt;/b&amp;gt; — a centralised Azure AI Hub that enables multiple agency teams to onboard AI projects securely and efficiently within a shared infrastructure.&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;The platform supports three onboarding patterns (Use Cases) based on security, connectivity, and resource-sharing needs. All projects are hosted within a single AI Foundry Hub, isolated by Azure RBAC and network controls, avoiding the overhead of separate subscriptions per team.&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;&amp;lt;b&amp;gt;Key objectives:&amp;lt;/b&amp;gt; Reduce time-to-onboard for new AI projects &amp;amp;#x2022; Enforce security and compliance by default &amp;amp;#x2022; Enable resource sharing without cross-team data leakage &amp;amp;#x2022; Support private, semi-private, and shared resource patterns.&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;115\&quot; width=\&quot;1100\&quot; x=\&quot;50\&quot; y=\&quot;172\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s2_hdr\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=#1e3a5f;fontColor=#ffffff;align=left;verticalAlign=middle;fontSize=13;fontStyle=1;rounded=1;\&quot; value=\&quot;2. Problem Statement\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;30\&quot; width=\&quot;1100\&quot; x=\&quot;50\&quot; y=\&quot;300\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s2_body\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#cccccc;fillColor=#f9f9f9;align=left;verticalAlign=top;fontSize=11;spacingLeft=8;spacingTop=6;\&quot; value=\&quot;&amp;lt;p&amp;gt;Agency teams require access to large language models, AI search, and data services to build intelligent applications. Without a shared platform:&amp;lt;/p&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;Each team independently provisions Azure AI resources, leading to cost duplication and configuration drift.&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;There is no consistent security baseline — some teams expose resources publicly, others lack private endpoint configurations.&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;Teams with strict compliance needs (e.g. LIRR, OMB requiring private agent capability) have no templated pattern to follow.&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;Onboarding takes weeks due to ad-hoc infrastructure requests with no standard process.&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;110\&quot; width=\&quot;1100\&quot; x=\&quot;50\&quot; y=\&quot;332\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s3_hdr\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=none;fillColor=#1e3a5f;fontColor=#ffffff;align=left;verticalAlign=middle;fontSize=13;fontStyle=1;rounded=1;\&quot; value=\&quot;3. Goals &amp;amp; Success Metrics\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;30\&quot; width=\&quot;1100\&quot; x=\&quot;50\&quot; y=\&quot;455\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;s3_th1\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;strokeColor=#999;fillColor=#dae8fc;align=center;verticalAlign=middl
